<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل دخول - شبكة طواف نت</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-dark: #240046;
            --primary-light: #7b2cbf;
            --accent: #e0aaff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --input-bg: rgba(0, 0, 0, 0.3);
            --success: #00b894;
            --warning: #fdcb6e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #10002b 0%, #240046 50%, #3c096c 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* خلفية متحركة أيقونات */
        .bg-icons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.03);
            font-size: 4rem;
            animation: float 6s ease-in-out infinite;
        }

        .bg-icon:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .bg-icon:nth-child(2) { top: 20%; right: 10%; font-size: 3rem; animation-delay: 1s; }
        .bg-icon:nth-child(3) { bottom: 15%; left: 15%; font-size: 5rem; animation-delay: 2s; }
        .bg-icon:nth-child(4) { bottom: 10%; right: 20%; animation-delay: 3s; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* حاوية البطاقة الرئيسية */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 1;
            margin: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* الهيدر */
        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .network-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .bolt-icon {
            color: #ffd700;
            animation: pulse 2s infinite;
        }

        .sub-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: 400;
        }

        /* عناصر الإدخال */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .custom-input, .custom-select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 45px 14px 15px; /* مسافة للأيقونة */
            border-radius: 12px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            appearance: none;
        }

        .custom-select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: left 15px center;
            background-size: 16px;
        }

        .custom-input:focus, .custom-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(123, 44, 191, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .custom-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* زر الدخول */
        .login-btn {
            background: linear-gradient(90deg, #7b2cbf 0%, #9d4edd 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.4);
            margin-top: 10px;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* قسم التنبيه */
        .notice-box {
            background: rgba(253, 203, 110, 0.1);
            border: 1px solid rgba(253, 203, 110, 0.2);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notice-content {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #ffeaa7;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.2);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* أزرار التواصل */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .contact-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .contact-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* الشريط السفلي */
        .bottom-nav {
            display: flex;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.3s;
        }

        .nav-item i {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--accent);
        }

        /* الفوتر */
        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 10px;
        }

        /* خيارات Select */
        option {
            background: #240046;
            color: #fff;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="bg-icons">
        <i class="fas fa-wifi bg-icon"></i>
        <i class="fas fa-mobile-alt bg-icon"></i>
        <i class="fas fa-shield-alt bg-icon"></i>
        <i class="fas fa-network-wired bg-icon"></i>
    </div>

    <div class="login-card">
        
        <div class="header">
            <div class="network-title">
                <i class="fas fa-bolt bolt-icon"></i>
                شبكة طواف نت اللاسلكية
                <i class="fas fa-bolt bolt-icon"></i>
            </div>
            <p class="sub-text">إنترنت فائق السرعة، استقرار وأمان</p>
        </div>

        <form class="form-group" action="login" method="post">
            
            <div class="input-wrapper">
                <i class="fas fa-tachometer-alt input-icon"></i>
                <select class="custom-select">
                    <option value="" disabled selected>اختر سرعة الباقة</option>
                    <option value="1m">باقة 1 ميجا - اقتصادي</option>
                    <option value="2m">باقة 2 ميجا - مميز</option>
                    <option value="4m">باقة 4 ميجا - سريع</option>
                    <option value="vip">باقة VIP - مفتوح السرعة</option>
                </select>
            </div>

            <div class="input-wrapper">
                <i class="fas fa-ticket-alt input-icon"></i>
                <input type="tel" class="custom-input" placeholder="أدخل رقم الكرت / القسيمة" required>
            </div>

            <div class="input-wrapper">
                <i class="fas fa-save input-icon"></i>
                <select class="custom-select" style="font-size: 0.9rem; color: #ccc;">
                    <option value="">استخدام كرت محفوظ...</option>
                    <option value="saved1">كرت الأسبوع الماضي (****589)</option>
                </select>
            </div>

            <button type="submit" class="login-btn">
                تسجيل الدخول <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
            </button>

            <div class="notice-box">
                <div class="notice-content">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>الموافقة على شروط الاستخدام</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </form>

        <div class="contact-grid">
            <a href="tel:777000000" class="contact-btn">
                <i class="fas fa-phone-alt"></i> اتصل بنا
            </a>
            <a href="https://wa.me/967777000000" class="contact-btn">
                <i class="fab fa-whatsapp"></i> راسلنا
            </a>
        </div>

        <div class="bottom-nav">
            <a href="#" class="nav-item">
                <i class="fas fa-tags"></i>
                <span>الأسعار</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>نقاط البيع</span>
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-gift"></i>
                <span>العروض</span>
            </a>
        </div>

        <div class="footer">
            تطوير وبرمجة شبكة طواف نت © 2026
        </div>

    </div>

</body>
</html>
